<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediSupply - Restablecer contrasena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
  <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore-compat.js"></script>
</head>
<body class="auth-page">
  <main class="auth-page-shell">
    <a class="auth-page-logo" href="index.html" aria-label="Volver al catalogo">
      <span class="logo-icon">+</span>
      <span class="logo-text">Medi<span class="logo-accent">Supply</span></span>
    </a>

    <section class="auth-page-card" aria-labelledby="recovery-page-title">
      <div class="auth-header">
        <span class="auth-logo" aria-hidden="true">+</span>
        <h1 id="recovery-page-title">Restablecer contrasena</h1>
        <p>El enlace se valida con Firebase antes de permitir el cambio.</p>
      </div>

      <form class="auth-form" id="recovery-password-form" novalidate>
        <p class="recovery-help">Cuenta: <strong id="recovery-email-display">validando token...</strong></p>
        <div class="form-group">
          <label for="recovery-new-password">Nueva contrasena</label>
          <input type="password" id="recovery-new-password" minlength="8" placeholder="Minuscula, mayuscula y numero" required autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="recovery-confirm-password">Confirmar contrasena</label>
          <input type="password" id="recovery-confirm-password" placeholder="Repite tu contrasena" required autocomplete="new-password">
        </div>
        <div class="form-error" id="recovery-password-error" hidden role="alert"></div>
        <button type="submit" class="btn-primary-full" id="btn-reset-password" disabled>Cambiar contrasena</button>
        <p class="auth-switch">
          Necesitas otro enlace?
          <a class="auth-link" href="login.html">Volver a iniciar sesion</a>
        </p>
      </form>
    </section>
  </main>

  <div id="toast-container" aria-live="polite" aria-atomic="false"></div>
  <script src="js/firebase-config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => Auth.init());
  </script>
</body>
</html>
