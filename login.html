<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediSupply - Iniciar sesion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
  <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore-compat.js"></script>
</head>
<body class="auth-page">
  <main class="auth-page-shell">
    <a class="auth-page-logo" href="index.html" aria-label="Volver al catalogo">
      <span class="logo-icon">+</span>
      <span class="logo-text">Medi<span class="logo-accent">Supply</span></span>
    </a>

    <section class="auth-page-card" aria-labelledby="auth-page-title">
      <div class="auth-header">
        <span class="auth-logo" aria-hidden="true">+</span>
        <h1 id="auth-page-title">Iniciar sesion</h1>
        <p>Accede con tu correo para continuar con tus compras y consultar tu historial.</p>
      </div>

      <form class="auth-form" id="login-form" autocomplete="on" novalidate>
        <div class="form-group">
          <label for="login-email">Correo electronico</label>
          <input type="email" id="login-email" name="email" placeholder="correo@ejemplo.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="login-password">Contrasena</label>
          <div class="input-wrapper">
            <input type="password" id="login-password" name="password" placeholder="Minimo 8 caracteres" required autocomplete="current-password">
            <button type="button" class="btn-show-pass" data-target="login-password" aria-label="Mostrar contrasena">Mostrar</button>
          </div>
        </div>
        <div class="form-error" id="login-error" hidden role="alert"></div>
        <button type="submit" class="btn-primary-full" id="btn-login">Iniciar sesion</button>
        <button type="button" class="auth-link forgot-link" id="btn-forgot-password">Olvide mi contrasena</button>
        <p class="auth-switch">
          No tienes cuenta?
          <a class="auth-link" href="register.html">Registrate gratis</a>
        </p>
      </form>
    </section>
  </main>

  <div id="toast-container" aria-live="polite" aria-atomic="false"></div>
  <script src="js/firebase-config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => Auth.init());
  </script>
</body>
</html>
